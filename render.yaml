services:
  - type: web
    name: farmdirect-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 8000 
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://farmdirect-frontend.onrender.com,http://localhost:3000"

  - type: web
    name: farmdirect-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://farmdirect-backend.onrender.com
